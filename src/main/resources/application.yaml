spring:
  application:
    name: hello-ai

  ai:
    openai:
      base-url: ${OPENAI_BASE_URL:https://open.cherryin.cc}
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: ${OPENAI_CHAT_MODEL:z-ai/glm-5}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    com.tc.ai: INFO
    org.springframework.ai.chat.client.advisor: DEBUG
    org.springframework.ai.tool: DEBUG
